# .flow/workspace.toml — generated by /flow init
# generated_at = '2026-06-03T14:02:43Z'

[tracker]
backend = "beads"

[tracker.beads]
prefix = "flow"
shared_server = true

# Stabilization freeze: this repo must not target itself for automatic
# self-evolution while the orchestration machinery is being simplified.
[maintainer]
self_target = false

# Stabilization freeze: retain the inactive evolve tuning for rollback context,
# but prohibit automatic merge of Flow-on-Flow work.
[evolve]
cap = 10
concurrency = 8
auto_merge_hot = false
# model tiering for spawned worker runs: fable for the interactive orchestrator, opus for spawned worker runs, sonnet for trivial.
worker_model = "opus"
# Inactive during stabilization; retained with the other evolve tuning for
# rollback context.
adjudicate_hot = true

# Optional native-agent model hints. Unsupported hints inherit the owner session model.
[models]
implement = "sonnet"
code_review = "opus"
review_loop = "sonnet"
e2e = "sonnet"
review_brief = "sonnet"
reflect = "opus"

# This repo opens PRs ready for review (maintainer preference). The engine
# default is draft (create_pr.py returns true when this key is unset), so
# removing this override reverts to draft PRs.
[create_pr]
draft = false

# PR-host (forge) seam. This repo is on GitHub, so create_pr/review_loop drive the
# `gh` adapter. The block is optional (absent = no forge); github needs no sub-keys.
[forge]
backend = "github"

[forge.github]

[pipeline]
stages = ["ticket", "plan", "implement", "code_review", "commit", "create_pr", "review_loop"]

[pipeline.handlers]
ticket = "inline"
plan = "inline"
implement = "subagent:general-purpose"
code_review = "inline"
commit = "inline"
create_pr = "inline"
review_loop = "inline"

[reflect]
# Explicit dormant guard during stabilization; reflect is not in the pipeline.
machinery = false

[memory]
namespace = "flow"
auto_recall = true
recall_by = ["branch", "current-ticket", "ready-tickets"]
recall_top_n = 5
compounding = false

[memory.semantic]
enabled = true
model = "BAAI/bge-small-en-v1.5"
