# .flow/workspace.toml — generated by /flow init
# generated_at = '2026-06-03T14:02:43Z'

[tracker]
backend = "beads"

[tracker.beads]
prefix = "flow"
shared_server = true

[pipeline]
stages = ["ticket", "plan", "implement", "code_review", "e2e", "commit", "create_pr", "review_loop", "reflect"]

[pipeline.handlers]
ticket = "inline"
plan = "subagent:Plan"
implement = "subagent:general-purpose"
code_review = "inline"
e2e = "none"
commit = "inline"
create_pr = "none"
review_loop = "none"
reflect = "inline"

[memory]
namespace = "flow"
auto_recall = true
recall_by = ["branch", "current-ticket", "ready-tickets"]
recall_top_n = 5
compounding = true
