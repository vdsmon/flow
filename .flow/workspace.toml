# .flow/workspace.toml — generated by /flow init
# generated_at = '2026-06-03T14:02:43Z'

[tracker]
backend = "beads"

[tracker.beads]
prefix = "flow"
shared_server = true

# This repo IS the flow self-improvement target. Travels with the repo (so the
# cloud routine's clone and local dogfooding both see it) and gates the
# self-evolution loop: machinery friction -> flow's beads, /flow evolve enabled.
[maintainer]
self_target = true

[pipeline]
stages = ["ticket", "plan", "implement", "code_review", "e2e", "commit", "create_pr", "review_loop", "reflect"]

[pipeline.handlers]
ticket = "inline"
plan = "subagent:Plan"
implement = "subagent:general-purpose"
code_review = "inline"
e2e = "none"
commit = "inline"
create_pr = "inline"
review_loop = "none"
reflect = "inline"

[reflect]
# flow runs its own pipeline on itself (dogfood); turn the harness self-repair
# lens on so reflect fixes machinery friction from inside the run.
machinery = true

[memory]
namespace = "flow"
auto_recall = true
recall_by = ["branch", "current-ticket", "ready-tickets"]
recall_top_n = 5
compounding = true
