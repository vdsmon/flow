# .flow/workspace.toml — generated by /flow init
# generated_at = '2026-06-03T14:02:43Z'

[tracker]
backend = "beads"

[tracker.beads]
prefix = "flow"
shared_server = true

# This repo IS the flow self-improvement target. Travels with the repo (so the
# cloud routine's clone and local dogfooding both see it) and gates the
# self-evolution loop: machinery friction -> flow's beads, /flow evolve enabled.
[maintainer]
self_target = true

# Maintainer self-target only: let the reaper auto-merge a hot leaf PR in
# isolation (one hot per pass). Stays off for user projects (human-merge keystone).
# cap/concurrency tune this repo's drainer fan-out (default 5/3); committed so the
# nightly schedule's ff-only advance doesn't conflict with a local uncommitted edit.
[evolve]
cap = 10
concurrency = 8
auto_merge_hot = true
# model tiering for spawned worker runs: fable for the interactive orchestrator, opus for spawned worker runs, sonnet for trivial.
worker_model = "opus"
# lift the hot hard-floor for this maintainer self-target repo (the human reviews
# every PR; the floor was pure friction). Merge-time guard-property review + CI gate.
adjudicate_hot = true

# Explicit routes are desired execution contracts. Flow records the selected route and
# requires structured launch acceptance before calling it active. The planner route is
# the ordinary strict read-only path, with no automatic fallback. Codex post-plan
# launches still inherit the owner model and remain visibly shadowed.
[agents.planner]
harness = "codex"
model = "gpt-5.6-sol"
effort = "xhigh"

[agents.plan_assessor]
harness = "claude_code"
model = "opus"
effort = "high"

[agents.implementer.by_owner.claude_code]
harness = "claude_code"
model = "sonnet"
effort = "high"

[agents.implementer.by_owner.codex]
harness = "codex"
model = "gpt-5.6-luna"
effort = "high"

[agents.e2e.by_owner.claude_code]
harness = "claude_code"
model = "sonnet"
effort = "medium"

[agents.e2e.by_owner.codex]
harness = "codex"
model = "gpt-5.6-luna"
effort = "medium"

[agents.diff_reviewer.by_owner.claude_code]
harness = "claude_code"
model = "opus"
effort = "high"

[agents.diff_reviewer.by_owner.codex]
harness = "codex"
model = "gpt-5.6-sol"
effort = "high"

[agents.guard_reviewer.by_owner.claude_code]
harness = "claude_code"
model = "opus"
effort = "high"

[agents.guard_reviewer.by_owner.codex]
harness = "codex"
model = "gpt-5.6-sol"
effort = "high"

[agents.revision_fixer.by_owner.claude_code]
harness = "claude_code"
model = "sonnet"
effort = "high"

[agents.revision_fixer.by_owner.codex]
harness = "codex"
model = "gpt-5.6-luna"
effort = "high"

# Removing [agents] restores the standalone legacy resolver during rollback.
[models]
work_model = "opus"   # deprecated global fallback -> implement, code_review, review_loop
e2e = "sonnet"        # per-stage override wins over work_model

# This repo opens PRs ready for review (maintainer preference). The engine
# default is draft (create_pr.py returns true when this key is unset), so
# removing this override reverts to draft PRs.
[create_pr]
draft = false

# PR-host (forge) seam. This repo is on GitHub, so create_pr/review_loop drive the
# `gh` adapter. The block is optional (absent = no forge); github needs no sub-keys.
[forge]
backend = "github"

[forge.github]

[pipeline]
stages = ["ticket", "plan", "implement", "code_review", "e2e", "commit", "create_pr", "review_loop", "review_brief", "reflect", "merge"]

[pipeline.handlers]
ticket = "inline"
plan = "subagent:Plan"
implement = "subagent:general-purpose"
code_review = "inline"
# Dogfood flow-l014 (e2e on by default): every ticket settles a recipe at spec
# time — a real one, test-ci-only, or a deliberate `skip: <reason>`. Recipes are
# authored from .flow/e2e-recipes.md; --auto runs fall back per verb-spec.
e2e = "subagent:general-purpose"
commit = "inline"
create_pr = "inline"
review_loop = "inline"
review_brief = "inline"
reflect = "inline"
# Layer 2: evolve self-target self-merges its own green+clean PR (hot via an
# independent reviewer). Bare plugin default is none = human keystone.
merge = "inline"

[review_brief]
# Generate a local, self-contained reviewer companion and open it when the host
# has a browser. It never blocks reflect; Forge remains the formal review gate.
mode = "auto"
open = true

[reflect]
# flow runs its own pipeline on itself (dogfood); turn the harness self-repair
# lens on so reflect fixes machinery friction from inside the run.
machinery = true

[memory]
namespace = "flow"
auto_recall = true
recall_by = ["branch", "current-ticket", "ready-tickets"]
recall_top_n = 5
compounding = true

[memory.semantic]
enabled = true
model = "BAAI/bge-small-en-v1.5"
