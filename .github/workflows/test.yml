name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/flow/skills/flow/scripts
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v4
      - name: lint (ruff + ty)
        run: mise run lint
      - name: test (pytest scripts)
        run: mise run test
      - name: public command registry check
        run: mise run check:commands
      - name: prose↔CLI seam check
        run: mise exec -- python3 seam_check.py

  review-brief-visual:
    runs-on: macos-14
    defaults:
      run:
        working-directory: plugins/flow/skills/flow/scripts/ui-tests
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: plugins/flow/skills/flow/scripts/ui-tests/package-lock.json
      - name: install visual-test dependencies
        run: npm ci
      - name: install Chromium
        run: npx playwright install chromium
      - name: review brief visual and accessibility regression
        run: npm test
