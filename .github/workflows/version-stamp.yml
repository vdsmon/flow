# version-stamp.yml: stamp the plugin version on every merge to main.
#
# Part of epic flow-3w71: move the version bump off the self-merge path onto a
# server-side Action. Reuses version.py's stamp math: read the current version
# from HEAD, bump MINOR on a feat squash subject else PATCH, write the Claude
# manifest/marketplace and Codex manifest versions, commit, push back to main.
#
# Push auth: the default GITHUB_TOKEN with `permissions: contents: write`. This
# works because main is NOT protected on this repo (branch protection is a
# Pro/public feature, unavailable here). GITHUB_TOKEN pushes also do not trigger
# workflows, the primary guard against a stamp -> CI -> stamp loop. If the repo
# ever gains branch protection, revisit: add a GitHub App token to the bypass
# list, or open a stamp PR.
name: version-stamp

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: version-stamp-main
  cancel-in-progress: false

jobs:
  stamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history: the guard diffs the whole push range (event.before may
          # be many commits back) and the retry loop rebases onto origin/main.
          fetch-depth: 0

      - name: Skip if this push already changed the plugin version
        id: guard
        run: |
          # Guard the whole push range, not just the tip commit: a multi-commit
          # push can carry the version-file change anywhere in the range.
          # event.before is empty on workflow_dispatch and all-zeros on branch
          # creation; fall back to the tip's parent.
          base="${{ github.event.before }}"
          if [ -z "$base" ] || ! git cat-file -e "$base" 2>/dev/null; then
            base=$(git rev-parse HEAD~1 2>/dev/null || true)
          fi
          if [ -z "$base" ]; then
            echo "no base commit, proceeding"
          else
            base_version=$(git show "$base:plugins/flow/.claude-plugin/plugin.json" 2>/dev/null \
              | python3 -c 'import json,sys; print(json.load(sys.stdin).get("version", ""))' \
              2>/dev/null || true)
            head_version=$(python3 -c 'import json; print(json.load(open("plugins/flow/.claude-plugin/plugin.json")).get("version", ""))')
            if [ -n "$base_version" ] && [ -n "$head_version" ] && \
              [ "$base_version" != "$head_version" ]; then
              echo "plugin version already changed in this push, skipping stamp"
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Stamp and push
        if: steps.guard.outputs.skip != 'true'
        run: |
          stamp_and_commit() {
            # 0 = stamp committed, 1 = already at target; a stamp tool error
            # fails the whole step.
            python3 plugins/flow/skills/flow/scripts/version.py stamp --ref HEAD --cwd . || exit 1
            if git diff --quiet -- \
              plugins/flow/.claude-plugin/plugin.json \
              .claude-plugin/marketplace.json \
              plugins/flow/.codex-plugin/plugin.json; then
              return 1
            fi
            git commit -m "chore: stamp plugin version [skip ci]" -- \
              plugins/flow/.claude-plugin/plugin.json \
              .claude-plugin/marketplace.json \
              plugins/flow/.codex-plugin/plugin.json || exit 1
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! stamp_and_commit; then
            echo "version already at target, nothing to stamp"
            exit 0
          fi
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "push rejected (main advanced mid-run), retrying: attempt $attempt"
            git fetch origin main
            if ! git rebase origin/main; then
              # A conflicting rebase means main's version lines changed under
              # us; drop our stamp and re-derive on the new tip.
              git rebase --abort
              git reset --hard origin/main
              if ! stamp_and_commit; then
                echo "version already at target after main advanced"
                exit 0
              fi
            fi
          done
          echo "push failed after 3 attempts" >&2
          exit 1
