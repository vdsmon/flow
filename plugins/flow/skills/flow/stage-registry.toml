# Canonical stage definitions.
# Single source of truth. Dispatcher reads opaquely; adding a stage = append entry + drop
# a reference doc under references/stage-<name>.md. Zero dispatcher code change.
#
# Closed vocabulary: external plugins map THEIR subcommands to these stage names via
# .flow-bundle.toml manifests. They cannot introduce new stage NAMES without a flow
# registry change.
#
# Field semantics:
#   name                          - matches references/stage-<name>.md and pipeline.stages entries
#   default_handler               - one of: "inline" | "subagent:<type>" | "skill:<name>[:<args>]" | "none"
#   default_timeout_min           - workspace.toml [pipeline.timeouts] overrides per-stage
#   required_predecessors         - upstream stages that MUST appear earlier in pipeline.stages
#   required_fields               - ticket-frontmatter keys that MUST be present for this stage;
#                                   parsed by _registry.py, consumed by lint_ticket.py to gate the
#                                   stage on frontmatter (the HARD GATE the gated stages run)
#   required                      - if true, MUST appear in pipeline.stages
#   required_when_compounding     - if true AND [memory] compounding=true, MUST appear
#   reference_doc                 - path relative to this skill dir; loaded by inline handler
#   roles                         - open-ended list round-tripped into the dispatch descriptor
#                                   (dispatch_stage.py); the dispatcher does NOT enforce them, a
#                                   handler or pre-handler hook keys off a role string. Live readers:
#                                   records_diff_baseline (implement pre-handler hook, SKILL.md) and
#                                   agent_routed (marks a stage resolved through the
#                                   explicit route snapshot and structured launch
#                                   receipt). reflect_anchor / ship_observer are
#                                   declared on the reflect stage but have no reader
#                                   yet: reserved, round-tripped unread.
#
# Timeouts for plan / code_review / e2e / commit / create_pr / review_loop
# are inferred defaults (the plan only specified ticket, implement, reflect explicitly).
# Workspaces are free to override via [pipeline.timeouts].

schema_version = 1

[[stage]]
name = "ticket"
description = "Resolve ticket key, fetch ticket context via tracker"
default_handler = "inline"
default_timeout_min = 5
required_predecessors = []
required = false
required_when_compounding = false
reference_doc = "references/stage-ticket.md"
roles = []

[[stage]]
name = "plan"
description = "Architect plan, return for approval"
default_handler = "subagent:Plan"
default_timeout_min = 10
required_predecessors = ["ticket"]
required = false
required_when_compounding = false
reference_doc = "references/stage-plan.md"
roles = []

[[stage]]
name = "implement"
description = "Code + unit tests, TDD discipline. Subagent writes code, writes/updates unit tests, runs them, reports only when green."
default_handler = "subagent:general-purpose"
default_timeout_min = 30
required_predecessors = ["ticket"]
required_fields = ["planned_files"]
required = false
required_when_compounding = false
reference_doc = "references/stage-implement.md"
roles = ["records_diff_baseline", "agent_routed"]

[[stage]]
name = "code_review"
description = "Main agent reviews own diff. Lower quality vs delegating to a code-review skill; opt-in via init wizard."
default_handler = "inline"
default_timeout_min = 15
required_predecessors = ["implement"]
required = false
required_when_compounding = false
reference_doc = "references/stage-code_review.md"
roles = []

[[stage]]
name = "e2e"
description = "Default-on: the correctness gate that observes the change behaving end-to-end. A workspace disables it only by explicitly wiring e2e = \"none\". Positioned AFTER code_review so cheap review catches issues before a slow e2e run burns time."
default_handler = "subagent:general-purpose"
default_timeout_min = 30
required_predecessors = ["code_review"]
required_fields = ["e2e_recipe"]
required = false
required_when_compounding = false
reference_doc = "references/stage-e2e.md"
roles = ["agent_routed"]

[[stage]]
name = "commit"
description = "Compose conventional commit (compose_commit.py skeleton, LLM fills body). Applies recorded implement-stage diff via git apply --cached; content-ownership gate refuses unrelated edits."
default_handler = "inline"
default_timeout_min = 5
required_predecessors = ["implement"]
required_fields = ["commit_type", "commit_summary"]
required = false
required_when_compounding = false
reference_doc = "references/stage-commit.md"
roles = []

[[stage]]
name = "create_pr"
description = "Bare default skips PR creation. Workspaces wire create_pr = \"inline\" (references/stage-create_pr.md → scripts/create_pr.py): git push + open-or-resolve the PR through the forge seam (gh or bkt, per [forge] backend), idempotent. Requires a [forge] block."
default_handler = "none"
default_timeout_min = 20
required_predecessors = ["commit"]
required = false
required_when_compounding = false
reference_doc = "references/stage-create_pr.md"
roles = []

[[stage]]
name = "review_loop"
description = "Bare default skips the CI / review-bot wait loop. Workspaces wire review_loop = \"inline\" (references/stage-review_loop.md → scripts/forge_cli.py): wait for CI green, drive fixes (<=3 cycles), resolve Major+ review threads. Integral on the forge seam; terminal on CI green AND zero unresolved Major+."
default_handler = "none"
default_timeout_min = 60
required_predecessors = ["create_pr"]
required = false
required_when_compounding = false
reference_doc = "references/stage-review_loop.md"
roles = []

[[stage]]
name = "review_brief"
description = "Local review companion generated after the PR pipeline. The inline handler (references/stage-review_brief.md → scripts/review_brief.py) degrades to a no-op in forge-less workspaces; otherwise it authors a motivation-first brief, freezes evidence at the exact PR SHA, opens a self-contained HTML artifact, and continues immediately to reflect. No human gate; Forge remains the formal review surface."
default_handler = "inline"
default_timeout_min = 10
required_predecessors = ["create_pr"]
required = false
required_when_compounding = false
reference_doc = "references/stage-review_brief.md"
roles = []

[[stage]]
name = "reflect"
description = "Closing-phase compounding extraction. Starts immediately after the review brief is generated; it never waits for human review. Reads state.json + subagent reports + final diff. Writes durable knowledge entries; conditional CLAUDE.md / MEMORY.md updates. If no novel signal, writes zero entries (not a failure)."
default_handler = "inline"
default_timeout_min = 5
required_predecessors = []
required = false
required_when_compounding = true
reference_doc = "references/stage-reflect.md"
roles = ["reflect_anchor", "ship_observer"]

[[stage]]
name = "merge"
description = "Terminal self-merge (evolve self-target only; bare default none = human keystone). Wired merge = \"inline\" (references/stage-merge.md → scripts/evolve_self_merge.py + forge_cli.py): after reflect, a green+clean evolve run self-merges its own PR; a hot bead only after an independent reviewer subagent clears the §6A guard-property check. Worktree teardown stays deferred to the janitor."
default_handler = "none"
default_timeout_min = 15
required_predecessors = ["reflect"]
required = false
required_when_compounding = false
reference_doc = "references/stage-merge.md"
roles = []
