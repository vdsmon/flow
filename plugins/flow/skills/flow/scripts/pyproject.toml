# Not a runtime artifact. Configures ruff + ty over this scripts/ dir only.
# Runtime scripts are PEP 723 inline-deps uv scripts.

[project]
name = "flow-scripts"
version = "0"
description = "Lint + type-check config for plugins/flow/skills/flow/scripts/. Not a runtime package."
requires-python = ">=3.12"

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["tests/_fixtures"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
]
ignore = [
    "E501",  # line length handled by formatter
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.ty.src]
# Type-check the runtime engine (scripts dir root). Default discovery walks the
# project root (this dir); `include = ["."]` matched nothing, so ty silently
# checked zero files. Tests are excluded: they're type-loose and most ty
# diagnostics there are just pytest being unresolvable in ty's env.
exclude = ["tests"]
